name: Release Paclet

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-upload:
    name: Build and upload paclet
    runs-on: ubuntu-latest
    container:
      image: wolframresearch/wolframengine:latest
      options: --user root
    env:
      WOLFRAM_SYSTEM_ID: Linux-x86-64
      WOLFRAMSCRIPT_ENTITLEMENTID: ${{ secrets.WOLFRAMSCRIPT_ENTITLEMENTID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build paclet
        run: |
          wolframscript -code 'paclet = PacletBuild["."]; Print[paclet]'

      - name: Collect paclet artifact
        run: |
          mkdir -p dist
          PACLET_FILE="$(find . -maxdepth 3 -name '*.paclet' | head -n 1)"
          test -n "$PACLET_FILE"
          cp "$PACLET_FILE" dist/
          ls -l dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: paclet
          path: dist/*.paclet
          if-no-files-found: error

      - name: Attach paclet to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.paclet
